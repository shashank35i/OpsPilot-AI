name: OpsPilot CI

on:
  # Runs when code is pushed directly to main
  push:
    branches:
      - main

  # Runs when a pull request targets main
  pull_request:
    branches:
      - main

  # Allows you to run the workflow manually from GitHub Actions
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opspilot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend - JUnit and Mockito
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn --batch-mode clean verify

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

  frontend-build:
    name: Frontend - React Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 7

  docker-build:
    name: Validate Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            --tag opspilot-backend:${{ github.sha }} \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --tag opspilot-frontend:${{ github.sha }} \
            ./frontend

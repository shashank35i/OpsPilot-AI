name: OpsPilot CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opspilot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend - JUnit and Mockito
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests and build JAR
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload backend JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 7

  frontend-build:
    name: Frontend - React Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 7

  backend-docker-build:
    name: Validate Backend Docker Image
    runs-on: ubuntu-latest

    needs:
      - backend-test
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend Docker image
        run: |
          docker build \
            --tag opspilot-backend:${{ github.sha }} \
            ./backend

      - name: Confirm Docker image exists
        run: docker image inspect opspilot-backend:${{ github.sha }}

server.port=${PORT}

spring.application.name=opspilot-backend

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.url=${REDIS_URL}

management.endpoints.web.exposure.include=health,info

opspilot.client-origin=${CLIENT_ORIGIN}
opspilot.jwt-secret=${JWT_SECRET}
opspilot.jwt-ttl-hours=${JWT_TTL_HOURS}
opspilot.seed-on-start=${SEED_ON_START}
opspilot.version=${APP_VERSION}
opspilot.sla-overdue-scheduler-enabled=${SLA_OVERDUE_SCHEDULER_ENABLED}
opspilot.sla-overdue-scheduler-delay-ms=${SLA_OVERDUE_SCHEDULER_DELAY_MS}
opspilot.sla-overdue-batch-size=${SLA_OVERDUE_BATCH_SIZE}
opspilot.sla-near-threshold-percent=${SLA_NEAR_THRESHOLD_PERCENT}
opspilot.unassigned-alert-minutes=${UNASSIGNED_ALERT_MINUTES}
opspilot.gemini-api-key=${GEMINI_API_KEY}
opspilot.gemini-model=${GEMINI_MODEL}

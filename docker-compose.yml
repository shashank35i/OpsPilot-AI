services:
  mysql:
    image: mysql:8.4
    container_name: opspilot-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: opspilot
      MYSQL_USER: opspilot
      MYSQL_PASSWORD: opspilot
      MYSQL_ROOT_PASSWORD: opspilot_root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspilot-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:mysql://mysql:3306/opspilot?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: opspilot
      DATABASE_PASSWORD: opspilot
      JWT_SECRET: change_me
      CLIENT_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      SEED_ON_START: "1"
      SLA_OVERDUE_SCHEDULER_ENABLED: "true"
      SLA_OVERDUE_SCHEDULER_DELAY_MS: "60000"
      SLA_OVERDUE_BATCH_SIZE: "100"
      SLA_NEAR_THRESHOLD_PERCENT: "80"
      UNASSIGNED_ALERT_MINUTES: "15"
      GEMINI_API_KEY: ""
      GEMINI_MODEL: gemini-1.5-flash
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: opspilot-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  mysql_data:
  redis_data:

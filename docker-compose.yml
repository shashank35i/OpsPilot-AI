version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: opspilot-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: opspilot
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: opspilot-backend
    ports:
      - "8080:8080"
    environment:
      MONGO_URL: mongodb://mongo:27017/opspilot
      JWT_SECRET: change_me
      CLIENT_ORIGIN: http://localhost:5173
      SEED_ON_START: "1"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: opspilot-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  mongo_data:
